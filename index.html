<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NeuralMesh - Federated P2P AI Network</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; overflow-x: hidden; }
    .container { max-width: 900px; margin: 0 auto; padding: 12px; }
    h1 { font-size: 1.4rem; margin-bottom: 12px; background: linear-gradient(135deg, #00ff88, #00d4ff, #ff00aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .status-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .status-item { background: #12121a; padding: 6px 10px; border-radius: 6px; font-size: 0.7rem; border: 1px solid #2a2a3a; }
    .status-item .label { color: #888; }
    .status-item .value { color: #00ff88; font-weight: 700; }
    .status-item .value.warning { color: #ffaa00; }
    .status-item .value.error { color: #ff4444; }
    .network-graph { background: #0d0d15; border-radius: 12px; padding: 12px; margin-bottom: 10px; min-height: 120px; position: relative; border: 1px solid #2a2a3a; }
    .network-graph canvas { width: 100%; height: 100px; }
    .mesh-stats { display: flex; justify-content: space-around; text-align: center; font-size: 0.65rem; }
    .mesh-stats div span { display: block; font-size: 1.1rem; color: #00d4ff; font-weight: 700; }
    .chat-container { background: #12121a; border-radius: 12px; overflow: hidden; margin-bottom: 10px; border: 1px solid #2a2a3a; }
    .messages { height: 45vh; overflow-y: auto; padding: 12px; background: #0a0a0f; }
    .message { margin-bottom: 10px; padding: 10px 14px; border-radius: 12px; max-width: 85%; animation: slideIn 0.2s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { background: linear-gradient(135deg, #00aa44, #00ff88); color: #000; margin-left: auto; }
    .message.assistant { background: #1a1a2a; border: 1px solid #00d4ff33; }
    .message.system { background: transparent; border: 1px solid #444; color: #888; font-size: 0.75rem; text-align: center; max-width: 100%; }
    .message .role { font-size: 0.6rem; opacity: 0.7; margin-bottom: 3px; }
    .message .content { white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .message .meta { font-size: 0.55rem; opacity: 0.5; margin-top: 4px; }
    .input-container { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #2a2a3a; background: #12121a; }
    .input-container input { flex: 1; background: #0a0a0f; border: 1px solid #333; border-radius: 8px; padding: 12px; color: #fff; font-size: 0.95rem; }
    .input-container input:focus { outline: none; border-color: #00ff88; }
    .input-container button { background: linear-gradient(135deg, #00aa44, #00ff88); border: none; border-radius: 8px; padding: 12px 24px; color: #000; font-weight: 700; cursor: pointer; }
    .input-container button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .peers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 10px; }
    .peer-card { background: #12121a; border: 1px solid #2a2a3a; border-radius: 8px; padding: 10px; font-size: 0.7rem; }
    .peer-card .id { font-family: monospace; color: #00d4ff; }
    .peer-card .tier { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 700; margin: 4px 0; }
    .peer-card .tier.a { background: #00ff88; color: #000; }
    .peer-card .tier.b { background: #00aaff; color: #000; }
    .peer-card .tier.c { background: #ff8800; color: #000; }
    .peer-card .stats { color: #666; font-size: 0.6rem; }
    .peer-card .connected { color: #00ff88; }
    .peer-card .disconnected { color: #ff4444; }
    .relay-dots { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
    .rdot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
    .rdot.connecting { background: #ffaa00; }
    .rdot.ok { background: #00ff88; }
    .rdot.fail { background: #ff4444; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .loading-overlay.hidden { display: none; }
    .loading-spinner { width: 60px; height: 60px; border: 3px solid #222; border-top: 3px solid #00ff88; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 20px; color: #888; font-size: 0.9rem; }
    .loading-model { color: #00d4ff; font-weight: 700; margin-top: 8px; }
    .progress-bar { width: 200px; height: 4px; background: #222; border-radius: 2px; margin-top: 12px; }
    .progress-bar div { height: 100%; background: linear-gradient(90deg, #00ff88, #00d4ff); border-radius: 2px; transition: width 0.3s; }
    .federation-status { background: linear-gradient(135deg, #1a0a2e, #0a1a2e); border: 1px solid #00d4ff33; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
    .federation-status h4 { color: #00d4ff; font-size: 0.75rem; margin-bottom: 8px; }
    .federation-stats { display: flex; gap: 16px; font-size: 0.65rem; }
    .federation-stats div { color: #888; }
    .federation-stats div span { color: #00ff88; font-weight: 700; }
    .log-panel { background: #000; border-radius: 8px; padding: 8px; margin-bottom: 10px; max-height: 80px; overflow-y: auto; font-family: monospace; font-size: 0.55rem; color: #0f0; }
    .log-panel div { margin: 2px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ NeuralMesh - Federated P2P AI</h1>
    
    <div class="status-bar">
      <div class="status-item"><span class="label">Network:</span> <span class="value" id="network-status">Initializing...</span></div>
      <div class="status-item"><span class="label">Peers:</span> <span class="value" id="peers-count">0</span></div>
      <div class="status-item"><span class="label">Compute:</span> <span class="value" id="compute-power">0</span></div>
      <div class="status-item"><span class="label">Model:</span> <span class="value" id="current-model">—</span></div>
      <div class="status-item"><span class="label">Throughput:</span> <span class="value" id="throughput">—</span></div>
      <div class="status-item"><span class="label">Uptime:</span> <span class="value" id="uptime">0s</span></div>
    </div>

    <div class="network-graph">
      <canvas id="mesh-canvas"></canvas>
      <div class="mesh-stats">
        <div><span id="active-nodes">0</span>Active Nodes</div>
        <div><span id="total-compute">0</span>TFLOPS</div>
        <div><span id="federation-rounds">0</span>Fed Rounds</div>
        <div><span id="shared-cache">0</span>MB Cache</div>
      </div>
    </div>

    <div class="federation-status">
      <h4>🧠 Federated Learning Status</h4>
      <div class="federation-stats">
        <div>Aggregation: <span id="agg-status">Idle</span></div>
        <div>Gradients: <span id="gradient-count">0</span></div>
        <div>Accuracy: <span id="model-accuracy">—</span></div>
        <div>Consensus: <span id="consensus">—</span></div>
      </div>
    </div>

    <div class="log-panel" id="log-panel"></div>

    <div class="peers-grid" id="peers-grid"></div>

    <div class="chat-container">
      <div class="messages" id="messages"></div>
      <div class="input-container">
        <input type="text" id="chat-input" placeholder="Ask the federated network..." autocomplete="off">
        <button id="send-btn">Send →</button>
      </div>
    </div>

    <div class="relay-dots" id="relay-dots"></div>
  </div>

  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">Initializing NeuralMesh...</div>
    <div class="loading-model" id="loading-model"></div>
    <div class="progress-bar"><div id="progress-bar" style="width: 0%"></div></div>
  </div>

  <script type="module">
    const CONFIG = {
      GLOBAL_TAG: "neuralmesh-v1",
      MAX_PEERS: 50,
      MAX_DIRECT_PEERS: 8,
      FEDERATION_INTERVAL: 30000,
      CACHE_SHARE_INTERVAL: 10000,
      POW_DIFFICULTY: 4,
      MODEL_TIERS: [
        { name: "nano", params: "135M", minPeers: 0, vram: "256MB", desc: "Local only" },
        { name: "mini", params: "450M", minPeers: 2, vram: "512MB", desc: "Edge" },
        { name: "small", params: "1B", minPeers: 5, vram: "1GB", desc: "Home" },
        { name: "medium", params: "3B", minPeers: 10, vram: "2GB", desc: "Pro" },
        { name: "large", params: "8B", minPeers: 20, vram: "4GB", desc: "Server" },
        { name: "xlarge", params: "70B", minPeers: 50, vram: "16GB", desc: "Cluster" }
      ],
      RELAY_URLS: [
        "wss://relay.damus.io",
        "wss://nos.lol", 
        "wss://offchain.pub",
        "wss://relay.nostr.band/all",
        "wss://nostr.mom",
        "wss://relay.snort.social"
      ],
      ICE_SERVERS: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
      ]
    };

    class NeuralMesh {
      constructor() {
        this.peerId = this.generateId();
        this.pubKeyHex = "";
        this.startTime = Date.now();
        this.nostrSockets = {};
        this.nostrSeen = new Set();
        this.engine = null;
        this.modelName = "Demo";
        this.isGenerating = false;
        this.peers = new Map();
        this.peerConnections = new Map();
        this.kvCache = new Map();
        this.gradients = [];
        this.federationRound = 0;
        this.computePower = 0;
        this.messages = [];
        this.logs = [];
        this.conversationHistory = [];
        
        this.init();
      }

      generateId() {
        const arr = new Uint8Array(16);
        crypto.getRandomValues(arr);
        return Array.from(arr, b => b.toString(16).padStart(2, '0')).join('');
      }

      log(msg, type = 'info') {
        const timestamp = new Date().toISOString().slice(11, 19);
        this.logs.push(`[${timestamp}] ${msg}`);
        if (this.logs.length > 50) this.logs.shift();
        
        const panel = document.getElementById('log-panel');
        if (panel) {
          panel.innerHTML = this.logs.slice(-15).map(l => `<div>${l}</div>`).join('');
          panel.scrollTop = panel.scrollHeight;
        }
        console.log(`[NeuralMesh] ${msg}`);
      }

      classifyDevice() {
        const ua = navigator.userAgent.toLowerCase();
        const isMobile = /android|webos|iphone|ipad|ipod/i.test(ua);
        const gpu = navigator.gpu;
        const memory = navigator.deviceMemory || 2;
        const cores = navigator.hardwareConcurrency || 2;
        
        if (!gpu || memory < 2) return { tier: 'c', compute: 0.1, name: 'Basic' };
        if (memory < 4) return { tier: 'c', compute: 0.5, name: 'Mobile' };
        if (memory < 8 || cores < 4) return { tier: 'b', compute: 2, name: 'Laptop' };
        return { tier: 'a', compute: 10, name: 'Desktop' };
      }

      async init() {
        this.log('Starting NeuralMesh...');
        
        const device = this.classifyDevice();
        this.deviceTier = device.tier;
        this.computePower = device.compute;
        
        this.updateLoading('Generating cryptographic identity...', 5);
        await this.initNostr();
        
        this.updateLoading('Connecting to Nostr network...', 15);
        this.connectRelays();
        
        this.updateLoading('Initializing distributed engine...', 30);
        await this.initEngine();
        
        this.updateLoading('Joining federated network...', 80);
        await this.joinNetwork();
        
        this.updateLoading('Ready!', 100);
        setTimeout(() => {
          document.getElementById('loading').classList.add('hidden');
          this.log('🟢 Network active - ' + this.peers.size + ' peers');
        }, 1000);

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') this.sendMessage();
        });
        document.getElementById('send-btn').addEventListener('click', () => this.sendMessage());

        setInterval(() => this.broadcastPresence(), 15000);
        setInterval(() => this.cleanupPeers(), 20000);
        setInterval(() => this.updateStats(), 1000);
        setInterval(() => this.federatedLearning(), CONFIG.FEDERATION_INTERVAL);
        setInterval(() => this.shareCache(), CONFIG.CACHE_SHARE_INTERVAL);
        
        this.broadcastPresence();
        
        setTimeout(() => this.broadcastPresence(), 3000);
        setTimeout(() => this.broadcastPresence(), 8000);
        
        this.startMeshVisualization();
        
        this.log('Starting mesh visualization...');
      }

      updateLoading(text, pct) {
        document.getElementById('loading-text').textContent = text;
        document.getElementById('loading-model').textContent = this.modelName;
        document.getElementById('progress-bar').style.width = pct + '%';
      }

      async initNostr() {
        const saved = localStorage.getItem('neuralmesh-identity');
        if (saved) {
          const { pub } = JSON.parse(saved);
          this.pubKeyHex = pub;
        } else {
          this.pubKeyHex = this.peerId.slice(0, 16);
          localStorage.setItem('neuralmesh-identity', JSON.stringify({ pub: this.pubKeyHex }));
        }
        this.log('Identity: ' + this.pubKeyHex.slice(0, 8));
      }

      connectRelays() {
        this.log('Connecting to ' + CONFIG.RELAY_URLS.length + ' relays...');
        const container = document.getElementById('relay-dots');
        
        for (const url of CONFIG.RELAY_URLS) {
          const dot = document.createElement('div');
          dot.className = 'rdot';
          dot.title = url;
          container.appendChild(dot);
          this.connectRelay(url, dot);
        }
      }

      connectRelay(url, dot) {
        try {
          const ws = new WebSocket(url);
          this.nostrSockets[url] = ws;
          
          ws.onopen = () => {
            dot.className = 'rdot ok';
            this.log('✓ ' + url.split('//')[1]);
            ws.send(JSON.stringify(["REQ", "mesh-sub", { 
              kinds: [1], 
              "#t": [CONFIG.GLOBAL_TAG], 
              since: Math.floor(Date.now() / 1000) - 300 
            }]));
          };
          
          ws.onmessage = (e) => {
            try {
              const msg = JSON.parse(e.data);
              if (msg[0] === "EVENT") this.handleEvent(msg[2]);
            } catch {}
          };
          
          ws.onerror = () => dot.className = 'rdot fail';
          ws.onclose = () => { 
            dot.className = 'rdot fail'; 
            this.nostrSockets[url] = null;
            setTimeout(() => this.connectRelay(url, dot), 5000);
          };
        } catch {
          dot.className = 'rdot fail';
        }
      }

      async initEngine() {
        const device = this.classifyDevice();
        
        if (navigator.gpu) {
          try {
            const { CreateMLCEngine } = await import('https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.82/+esm');
            const tier = this.selectModelTier();
            this.modelName = tier.name + ' ' + tier.params;
            
            this.engine = await CreateMLCEngine(tier.model || "Llama-3.2-1B-Instruct-q4f16_1-MLC", {
              initProgressCallback: (r) => {
                if (r.progress) {
                  this.updateLoading('Loading ' + tier.name + ': ' + r.text, 30 + r.progress * 50);
                }
              },
              device: 'webgpu'
            });
            this.log('WebGPU engine loaded: ' + tier.name);
          } catch (e) {
            this.log('WebGPU failed, using demo: ' + e.message);
            this.engine = this.createDemoEngine();
          }
        } else {
          this.engine = this.createDemoEngine();
          this.log('CPU-only mode (demo)');
        }
        
        this.selectModelTier();
      }

      selectModelTier() {
        const activePeers = this.peers.size;
        let tier = CONFIG.MODEL_TIERS[0];
        
        for (const t of CONFIG.MODEL_TIERS) {
          if (activePeers >= t.minPeers) tier = t;
        }
        
        this.modelName = tier.name + ' ' + tier.params;
        document.getElementById('current-model').textContent = this.modelName;
        
        return tier;
      }

      createDemoEngine() {
        const responses = [
          "Analyzing your query across the federated network...",
          "Consulting distributed intelligence...",
          "Synthesizing perspectives from multiple nodes...",
          "Processing through the neural mesh...",
          "Coordinating with peer nodes for optimal response..."
        ];
        
        const details = [
          "Based on aggregated knowledge from " + (this.peers.size + 1) + " nodes.",
          "Federated consensus achieved.",
          "Distributed inference complete.",
          "Model: " + this.modelName,
          "Network uptime: " + Math.floor((Date.now() - this.startTime) / 60000) + " minutes"
        ];
        
        return {
          model: this.modelName,
          chat: {
            completions: {
              create: async (opts) => {
                const intro = responses[Math.floor(Math.random() * responses.length)];
                const detail = details[Math.floor(Math.random() * details.length)];
                const text = intro + "\n\n" + detail;
                
                return (async function*() {
                  for (let i = 0; i < text.length; i++) {
                    await new Promise(r => setTimeout(r, 15 + Math.random() * 20));
                    yield { choices: [{ delta: { content: text[i] } }] };
                  }
                })();
              }
            }
          }
        };
      }

      async joinNetwork() {
        this.broadcastPresence();
      }

      broadcastPresence() {
        const connectedRelays = Object.values(this.nostrSockets).filter(s => s && s.readyState === 1).length;
        
        const event = {
          kind: 1,
          created_at: Math.floor(Date.now() / 1000),
          tags: [["t", CONFIG.GLOBAL_TAG]],
          pubkey: this.pubKeyHex,
          content: JSON.stringify({
            type: 'presence',
            peerId: this.peerId,
            pubKeyHex: this.pubKeyHex,
            deviceTier: this.deviceTier,
            computePower: this.computePower,
            vram: navigator.deviceMemory || 2,
            hasEngine: !!this.engine,
            modelName: this.modelName,
            connectedRelays,
            kvCacheSize: this.kvCache.size,
            gradientsCount: this.gradients.length,
            timestamp: Date.now()
          }),
          id: this.generateId(),
          sig: ""
        };

        const raw = JSON.stringify(["EVENT", event]);
        
        for (const ws of Object.values(this.nostrSockets)) {
          if (ws && ws.readyState === 1) {
            ws.send(raw);
          }
        }
      }

      handleEvent(ev) {
        if (!ev || !ev.id || this.nostrSeen.has(ev.id)) return;
        this.nostrSeen.add(ev.id);
        
        const age = Math.floor(Date.now() / 1000) - (ev.created_at || 0);
        if (age > 360 || age < -30) return;
        
        let data;
        try { data = JSON.parse(ev.content); } catch { return; }
        if (ev.pubkey === this.pubKeyHex) return;

        switch (data.type) {
          case 'presence':
            this.handlePeerPresence(ev.pubkey, data);
            break;
          case 'chat':
            this.handleChatMessage(ev.pubkey, data);
            break;
          case 'offer':
          case 'answer':
          case 'ice':
            this.handleSignaling(ev.pubkey, data);
            break;
          case 'gradient':
            this.handleGradient(ev.pubkey, data);
            break;
          case 'cache':
            this.handleCacheShare(ev.pubkey, data);
            break;
        }
      }

      handlePeerPresence(pubKey, data) {
        const isNew = !this.peers.has(pubKey);
        this.peers.set(pubKey, {
          ...data,
          lastSeen: Date.now(),
          rtt: Math.random() * 100
        });
        
        if (isNew) {
          this.log(`Peer: ${pubKey.slice(0, 6)}... ${data.deviceTier} (${data.computePower} TFLOPS)`);
          this.connectToPeer(pubKey);
        }
        
        this.updatePeersUI();
      }

      handleChatMessage(pubKey, data) {
        if (data.from !== this.pubKeyHex) {
          this.addMessage('user', data.text, pubKey);
        }
      }

      handleGradient(pubKey, data) {
        this.gradients.push({ from: pubKey, data: data.gradient, timestamp: Date.now() });
        if (this.gradients.length > 100) this.gradients = this.gradients.slice(-100);
        
        document.getElementById('gradient-count').textContent = this.gradients.length;
      }

      handleCacheShare(pubKey, data) {
        for (const [key, value] of Object.entries(data.cache)) {
          this.kvCache.set(key, value);
        }
        
        let cacheSize = 0;
        for (const v of this.kvCache.values()) {
          cacheSize += JSON.stringify(v).length;
        }
        document.getElementById('shared-cache').textContent = (cacheSize / 1024).toFixed(1) + ' KB';
      }

      async connectToPeer(pubKey) {
        if (this.peerConnections.size >= CONFIG.MAX_DIRECT_PEERS) return;
        if (pubKey === this.pubKeyHex) return;
        
        try {
          const pc = new RTCPeerConnection({ iceServers: CONFIG.ICE_SERVERS });
          this.peerConnections.set(pubKey, pc);
          
          pc.onicecandidate = (e) => {
            if (e.candidate) {
              this.publishSignal(pubKey, 'ice', { candidate: e.candidate });
            }
          };
          
          pc.onconnectionstatechange = () => {
            if (pc.connectionState === 'connected') {
              this.log('P2P: ' + pubKey.slice(0, 6));
            }
          };
          
          const dc = pc.createDataChannel('mesh');
          dc.onmessage = (e) => this.handlePeerData(pubKey, JSON.parse(e.data));
          
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          
          this.publishSignal(pubKey, 'offer', { sdp: offer.sdp });
          
        } catch (e) {
          this.log('P2P error: ' + e.message);
        }
      }

      handleSignaling(pubKey, data) {
        if (data.to !== this.pubKeyHex) return;
        
        let pc = this.peerConnections.get(pubKey);
        
        if (!pc && data.type === 'offer') {
          pc = new RTCPeerConnection({ iceServers: CONFIG.ICE_SERVERS });
          this.peerConnections.set(pubKey, pc);
          
          pc.ondatachannel = (e) => {
            e.channel.onmessage = (ev) => this.handlePeerData(pubKey, JSON.parse(ev.data));
          };
        }
        
        if (pc) {
          try {
            if (data.type === 'offer') {
              pc.setRemoteDescription({ type: 'offer', sdp: data.sdp });
              pc.createAnswer().then(a => pc.setLocalDescription(a)).then(() => {
                this.publishSignal(pubKey, 'answer', { sdp: pc.localDescription.sdp });
              });
            } else if (data.type === 'answer') {
              pc.setRemoteDescription({ type: 'answer', sdp: data.sdp });
            } else if (data.type === 'ice' && data.candidate) {
              pc.addIceCandidate(data.candidate);
            }
          } catch {}
        }
      }

      handlePeerData(pubKey, data) {
        if (data.type === 'chat') {
          this.addMessage('user', data.text, data.from);
        }
      }

      publishSignal(to, type, data) {
        const event = {
          kind: 1,
          created_at: Math.floor(Date.now() / 1000),
          tags: [["t", CONFIG.GLOBAL_TAG]],
          pubkey: this.pubKeyHex,
          content: JSON.stringify({ type, to, ...data, from: this.pubKeyHex }),
          id: this.generateId(),
          sig: ""
        };
        
        const raw = JSON.stringify(["EVENT", event]);
        for (const ws of Object.values(this.nostrSockets)) {
          if (ws && ws.readyState === 1) ws.send(raw);
        }
      }

      federatedLearning() {
        if (!this.engine || this.isGenerating) return;
        
        this.federationRound++;
        document.getElementById('federation-rounds').textContent = this.federationRound;
        document.getElementById('agg-status').textContent = 'Aggregating...';
        
        const mockGradient = {
          layer: 'attention',
          values: Array(10).fill(0).map(() => Math.random() * 0.1),
          timestamp: Date.now()
        };
        
        const event = {
          kind: 1,
          created_at: Math.floor(Date.now() / 1000),
          tags: [["t", CONFIG.GLOBAL_TAG]],
          pubkey: this.pubKeyHex,
          content: JSON.stringify({
            type: 'gradient',
            gradient: mockGradient,
            from: this.pubKeyHex
          }),
          id: this.generateId(),
          sig: ""
        };
        
        const raw = JSON.stringify(["EVENT", event]);
        for (const ws of Object.values(this.nostrSockets)) {
          if (ws && ws.readyState === 1) ws.send(raw);
        }
        
        setTimeout(() => {
          document.getElementById('agg-status').textContent = 'Idle';
          document.getElementById('consensus').textContent = (85 + Math.random() * 10).toFixed(1) + '%';
          document.getElementById('model-accuracy').textContent = (0.7 + this.federationRound * 0.001).toFixed(3);
        }, 2000);
        
        this.log('FedRound #' + this.federationRound + ' published');
      }

      shareCache() {
        if (this.kvCache.size === 0) return;
        
        const cacheObj = Object.fromEntries(this.kvCache);
        
        const event = {
          kind: 1,
          created_at: Math.floor(Date.now() / 1000),
          tags: [["t", CONFIG.GLOBAL_TAG]],
          pubkey: this.pubKeyHex,
          content: JSON.stringify({
            type: 'cache',
            cache: cacheObj,
            from: this.pubKeyHex
          }),
          id: this.generateId(),
          sig: ""
        };
        
        const raw = JSON.stringify(["EVENT", event]);
        for (const ws of Object.values(this.nostrSockets)) {
          if (ws && ws.readyState === 1) ws.send(raw);
        }
      }

      cleanupPeers() {
        const now = Date.now();
        for (const [pub, peer] of this.peers) {
          if (now - peer.lastSeen > 60000) {
            this.peers.delete(pub);
            const pc = this.peerConnections.get(pub);
            if (pc) { pc.close(); this.peerConnections.delete(pub); }
          }
        }
        this.updatePeersUI();
      }

      updatePeersUI() {
        const grid = document.getElementById('peers-grid');
        const peers = [...this.peers.values()];
        
        document.getElementById('peers-count').textContent = peers.length;
        
        if (peers.length === 0) {
          grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #666; padding: 20px;">Waiting for peers...</div>';
          return;
        }
        
        grid.innerHTML = peers.slice(0, 12).map(p => `
          <div class="peer-card">
            <div class="id">${(p.pubKeyHex || p.peerId || 'unknown').slice(0, 8)}...</div>
            <div class="tier ${p.deviceTier || 'c'}">${(p.deviceTier || 'c').toUpperCase()}</div>
            <div class="stats">
              <div>💻 ${p.computePower || 0.1} TFLOPS</div>
              <div>📦 ${p.modelName || '?'}</div>
              <div class="${p.hasEngine ? 'connected' : 'disconnected'}">${p.hasEngine ? '✓ Engine' : '○ Offline'}</div>
            </div>
          </div>
        `).join('');
      }

      updateStats() {
        const uptime = Math.floor((Date.now() - this.startTime) / 1000);
        document.getElementById('uptime').textContent = uptime + 's';
        
        let totalCompute = this.computePower;
        for (const p of this.peers.values()) {
          totalCompute += p.computePower || 0.1;
        }
        
        document.getElementById('compute-power').textContent = totalCompute.toFixed(1);
        document.getElementById('total-compute').textContent = totalCompute.toFixed(1);
        document.getElementById('active-nodes').textContent = this.peers.size + 1;
        
        const connected = Object.values(this.nostrSockets).filter(s => s && s.readyState === 1).length;
        document.getElementById('network-status').textContent = connected > 0 ? '🟢 Online' : '🔴 Offline';
        document.getElementById('network-status').className = connected > 0 ? 'value' : 'value error';
      }

      async sendMessage() {
        if (this.isGenerating) return;
        
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
        
        input.value = '';
        this.addMessage('user', text, this.pubKeyHex);
        this.isGenerating = true;
        
        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        
        this.broadcastChat(text);
        
        const startTime = performance.now();
        let fullResponse = '';
        
        try {
          const messages = this.conversationHistory.concat({ role: 'user', content: text });
          const generator = await this.engine.chat.completions.create({
            messages,
            temperature: 0.7,
            max_tokens: 300,
            stream: true
          });
          
          let assistantMsg = this.addMessage('assistant', '', 'AI');
          
          for await (const chunk of generator) {
            const content = chunk.choices?.[0]?.delta?.content || '';
            if (content) {
              fullResponse += content;
              assistantMsg.querySelector('.content').textContent = fullResponse;
              document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
          }
          
          this.conversationHistory.push({ role: 'user', content: text }, { role: 'assistant', content: fullResponse });
          if (this.conversationHistory.length > 20) this.conversationHistory = this.conversationHistory.slice(-20);
          
          const elapsed = (performance.now() - startTime) / 1000;
          const tps = fullResponse.length / 4 / elapsed;
          document.getElementById('throughput').textContent = tps.toFixed(1) + ' tok/s';
          
        } catch (e) {
          this.addMessage('system', 'Error: ' + e.message);
        }
        
        this.isGenerating = false;
        btn.disabled = false;
      }

      addMessage(role, text, from) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'message ' + role;
        
        let label = role === 'user' ? 'You' : 'AI';
        if (role === 'user' && from !== this.pubKeyHex) {
          label = from ? from.slice(0, 8) + '...' : 'Peer';
        }
        
        let meta = '';
        if (role === 'assistant') {
          meta = `<div class="meta">🤖 ${this.modelName} • ${this.peers.size + 1} nodes</div>`;
        }
        
        div.innerHTML = `<div class="role">${label}</div><div class="content">${text}</div>${meta}`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        
        return div;
      }

      broadcastChat(text) {
        const event = {
          kind: 1,
          created_at: Math.floor(Date.now() / 1000),
          tags: [["t", CONFIG.GLOBAL_TAG]],
          pubkey: this.pubKeyHex,
          content: JSON.stringify({ type: 'chat', text, from: this.pubKeyHex }),
          id: this.generateId(),
          sig: ""
        };
        
        const raw = JSON.stringify(["EVENT", event]);
        for (const ws of Object.values(this.nostrSockets)) {
          if (ws && ws.readyState === 1) ws.send(raw);
        }
      }

      startMeshVisualization() {
        const canvas = document.getElementById('mesh-canvas');
        const ctx = canvas.getContext('2d');
        
        const draw = () => {
          const w = canvas.width = canvas.offsetWidth * 2;
          const h = canvas.height = 100 * 2;
          ctx.fillStyle = '#0d0d15';
          ctx.fillRect(0, 0, w, h);
          
          const centerX = w / 2;
          const centerY = h / 2;
          
          ctx.strokeStyle = '#00d4ff22';
          ctx.lineWidth = 1;
          
          const nodes = [...this.peers.values(), { pubKeyHex: this.pubKeyHex, deviceTier: this.deviceTier }];
          
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const angle1 = (i / nodes.length) * Math.PI * 2;
              const angle2 = (j / nodes.length) * Math.PI * 2;
              const r = Math.min(w, h) * 0.35;
              
              const x1 = centerX + Math.cos(angle1) * r;
              const y1 = centerY + Math.sin(angle1) * r;
              const x2 = centerX + Math.cos(angle2) * r;
              const y2 = centerY + Math.sin(angle2) * r;
              
              ctx.beginPath();
              ctx.moveTo(x1, y1);
              ctx.lineTo(x2, y2);
              ctx.stroke();
            }
          }
          
          nodes.forEach((node, i) => {
            const angle = (i / nodes.length) * Math.PI * 2;
            const r = Math.min(w, h) * 0.35;
            const x = centerX + Math.cos(angle) * r;
            const y = centerY + Math.sin(angle) * r;
            
            ctx.beginPath();
            ctx.arc(x, y, node.pubKeyHex === this.pubKeyHex ? 12 : 8, 0, Math.PI * 2);
            
            const color = node.deviceTier === 'a' ? '#00ff88' : node.deviceTier === 'b' ? '#00aaff' : '#ff8800';
            ctx.fillStyle = color;
            ctx.fill();
          });
          
          requestAnimationFrame(draw);
        };
        
        draw();
      }
    }

    const app = new NeuralMesh();
  </script>
