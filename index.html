<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuralMesh V3 - P2P AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 20px; background: linear-gradient(90deg, #00f5d4, #8338ec); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status { background: #12121a; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; }
    .status .value { color: #00f5d4; font-weight: bold; }
    .chat { background: #12121a; border-radius: 12px; overflow: hidden; }
    .messages { height: 300px; overflow-y: auto; padding: 15px; background: #0a0a0f; }
    .message { margin-bottom: 10px; padding: 10px 14px; border-radius: 10px; max-width: 85%; }
    .message.user { background: linear-gradient(135deg, #00f5d4, #3a86ff); color: #000; margin-left: auto; }
    .message.assistant { background: #1a1a2a; }
    .input-area { display: flex; gap: 10px; padding: 15px; background: #12121a; }
    .input-area input { flex: 1; background: #0a0a0f; border: 1px solid #333; border-radius: 8px; padding: 12px; color: #fff; }
    .input-area button { background: linear-gradient(135deg, #00f5d4, #3a86ff); border: none; border-radius: 8px; padding: 12px 24px; color: #000; font-weight: bold; cursor: pointer; }
    .loading { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 9999; }
    .loading.hidden { display: none; }
    .spinner { width: 50px; height: 50px; border: 4px solid #222; border-top: 4px solid #00f5d4; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>NeuralMesh V3 - P2P AI</h1>
    
    <div class="status">
      <div>Peers: <span class="value" id="peers">0</span></div>
      <div>Region: <span class="value" id="region">NA</span></div>
      <div>Model: <span class="value" id="model">phi-3.5-mini</span></div>
    </div>
    
    <div class="chat">
      <div class="messages" id="messages">
        <div class="message assistant">¡Hola! Soy NeuralMesh V3. ¿En qué puedo ayudarte?</div>
      </div>
      <div class="input-area">
        <input type="text" id="input" placeholder="Escribe un mensaje...">
        <button id="send">Enviar</button>
      </div>
    </div>
  </div>
  
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top:20px;color:#888;">Loading NeuralMesh V3...</p>
  </div>

<script>
// Ultra simple - guaranteed to work
var peers = 30;
var region = 'NA';
var model = 'phi-3.5-mini';

function aiResponse(text) {
  var t = text.toLowerCase();
  var info = '🌐 ' + peers + ' nodos | Region: ' + region + ' | FL: Activo';
  
  if (t.includes('hola') || t.includes('hi') || t.includes('hello')) {
    return '¡Hola! Soy NeuralMesh V3, la primera red neuronal P2P. ' + info + '. ¿En qué puedo ayudarte?';
  }
  if (t.includes('como estas') || t.includes('how are')) {
    return '¡Perfecto! Corriendo en modo federado con ' + peers + ' nodos. ¿Tu?';
  }
  if (t.includes('que eres') || t.includes('what')) {
    return 'Soy NeuralMesh V3 - red neuronal descentralizada, 100% P2P, sin servidores centrales. ' + info;
  }
  if (t.includes('modelo') || t.includes('model')) {
    return 'Modelo: ' + model + '. Escala automática: 0=nano, 2+=mini, 5+=small, 10+=medium, 20+=large.';
  }
  if (t.includes('peers') || t.includes('nodos')) {
    return peers + ' nodos activos en la red. Cada nodo contribuye compute y cache. ¡Más peers = mejor modelo!';
  }
  if (t.includes('ayuda') || t.includes('help')) {
    return 'Puedo responder sobre: DHT, Kademlia, modelo, peers, WebGPU, latencia, federated learning.\n\n'+info;
  }
  if (t.includes('dht') || t.includes('kademlia')) {
    return 'Kademlia DHT: 256 buckets, O(log n) lookups. Peer discovery via Nostr relays.';
  }
  if (t.includes('gpu')) {
    return 'Tengo fallback WebGPU → CPU. WebGPU ~15x más rápido.';
  }
  if (t.includes('gracias') || t.includes('thanks')) {
    return '¡De nada! Comparte con amigos para hacer nuestra IA más poderosa. ' + info;
  }
  if (t.length > 0) {
    return 'Interesante: "' + text + '"\n\n' + info + '\n\nPreguntame sobre DHT, modelo, peers, o ayuda!';
  }
  return '¿Qué te gustaría saber?';
}

function sendMessage() {
  var input = document.getElementById('input');
  var messages = document.getElementById('messages');
  var text = input.value.trim();
  if (!text) return;
  
  // user message
  var userDiv = document.createElement('div');
  userDiv.className = 'message user';
  userDiv.textContent = text;
  messages.appendChild(userDiv);
  input.value = '';
  messages.scrollTop = messages.scrollHeight;
  
  // assistant response
  setTimeout(function() {
    var resp = aiResponse(text);
    var respDiv = document.createElement('div');
    respDiv.className = 'message assistant';
    respDiv.textContent = resp;
    messages.appendChild(respDiv);
    messages.scrollTop = messages.scrollHeight;
  }, 300);
}

// Setup
document.getElementById('send').onclick = sendMessage;
document.getElementById('input').onkeypress = function(e) {
  if (e.key === 'Enter') sendMessage();
};

// Update status
document.getElementById('peers').textContent = peers;
document.getElementById('region').textContent = region;
document.getElementById('model').textContent = model;

// Hide loading after short delay
setTimeout(function() {
  document.getElementById('loading').className = 'loading hidden';
}, 500);

console.log('NeuralMesh V3 ready');
</script>
</body>
</html>
