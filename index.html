<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>P2P-LLM — Decentralized AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; overflow-x: hidden; }
    .container { max-width: 800px; margin: 0 auto; padding: 12px; }
    h1 { font-size: 1.2rem; margin-bottom: 12px; background: linear-gradient(135deg, #00e5ff, #b16bff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .status-item { background: #161b22; padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; }
    .status-item .label { color: #8b949e; }
    .status-item .value { color: #7ee787; font-weight: 600; }
    .status-item.error .value { color: #f85149; }
    .chat-container { background: #161b22; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
    .messages { height: 50vh; overflow-y: auto; padding: 12px; }
    .message { margin-bottom: 12px; padding: 10px; border-radius: 8px; }
    .message.user { background: #1f6feb; margin-left: 20%; }
    .message.assistant { background: #21262d; margin-right: 20%; }
    .message.system { background: #161b22; border: 1px solid #30363d; color: #8b949e; font-size: 0.85rem; text-align: center; }
    .message .role { font-size: 0.65rem; color: #8b949e; margin-bottom: 4px; }
    .message .content { white-space: pre-wrap; word-break: break-word; }
    .input-container { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #30363d; }
    .input-container input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px; color: #c9d1d9; font-size: 0.95rem; }
    .input-container input:focus { outline: none; border-color: #58a6ff; }
    .input-container button { background: #238636; border: none; border-radius: 8px; padding: 10px 20px; color: white; font-weight: 600; cursor: pointer; }
    .input-container button:disabled { background: #30363d; cursor: not-allowed; }
    .input-container button.loading { background: #d29922; }
    .peers-list { background: #161b22; border-radius: 8px; padding: 10px; margin-bottom: 12px; }
    .peers-list h3 { font-size: 0.85rem; color: #8b949e; margin-bottom: 8px; }
    .peer-item { display: flex; justify-content: space-between; align-items: center; padding: 6px; background: #21262d; border-radius: 6px; margin-bottom: 4px; font-size: 0.8rem; }
    .peer-item .tier { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
    .peer-item .tier.a { background: #238636; }
    .peer-item .tier.b { background: #1f6feb; }
    .peer-item .tier.c { background: #d29922; color: #0d1117; }
    .peer-item .status { font-size: 0.65rem; }
    .relay-dots { display: flex; gap: 6px; margin-bottom: 8px; }
    .rdot { width: 8px; height: 8px; border-radius: 50%; background: #30363d; }
    .rdot.connecting { background: #d29922; }
    .rdot.ok { background: #238636; }
    .rdot.fail { background: #f85149; }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(13,17,23,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    .loading-overlay.hidden { display: none; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; }
    .loading-text { margin-top: 16px; color: #8b949e; }
    .loading-progress { width: 200px; height: 4px; background: #30363d; border-radius: 2px; margin-top: 8px; }
    .loading-progress-bar { height: 100%; background: #58a6ff; border-radius: 2px; transition: width 0.3s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .network-status { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #8b949e; }
    .network-status .connected { color: #238636; }
    .network-status .searching { color: #d29922; }
    .debug-log { max-height: 120px; overflow-y: auto; font-size: 10px; background: #000; color: #0f0; padding: 8px; border-radius: 8px; margin-bottom: 8px; font-family: monospace; }
  </style>
</head>
<body>
  <div class="container">
    <h1>P2P-LLM</h1>
    <div class="status-bar">
      <div class="status-item" id="tier-status"><span class="label">TIER:</span> <span class="value" id="tier-value">—</span></div>
      <div class="status-item" id="mode-status"><span class="label">MODE:</span> <span class="value" id="mode-value">—</span></div>
      <div class="status-item"><span class="label">PEERS:</span> <span class="value" id="peers-value">0</span></div>
      <div class="status-item"><span class="label">Score:</span> <span class="value" id="score-value">0</span></div>
      <div class="status-item"><span class="label">tok/s:</span> <span class="value" id="tps-value">—</span></div>
    </div>
    <div class="network-status">
      <span>RELAYS:</span> <span id="relays-status">0/0</span>
    </div>
    <div class="relay-dots" id="relay-dots"></div>
    <div class="debug-log" id="debug-log"></div>
    <div class="peers-list">
      <h3>⚡ Connected Peers</h3>
      <div id="peers-container">No peers connected</div>
    </div>
    <div class="chat-container">
      <div class="messages" id="messages"></div>
      <div class="input-container">
        <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off">
        <button id="send-btn">Send</button>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-item"><span class="label">🔗 Nostr Relays</span></div>
    </div>
    <div class="status-item" id="model-status"><span class="label">📦 Model / Shard Loading</span></div>
    <div class="status-item"><span class="label">🧩 Shard Map</span> <span class="value" id="shard-value">Calculating...</span></div>
    <div class="status-item"><span class="label">📊 Network Score</span></div>
    <div class="status-item"><span class="label">Mode:</span> <span class="value" id="net-mode">—</span></div>
    <div class="status-item"><span class="label">🖥️ Device Info</span></div>
    <div class="status-item"><span class="label">Device Tier:</span> <span class="value" id="device-tier">—</span></div>
    <div class="status-item"><span class="label">WebGPU:</span> <span class="value" id="webgpu-value">—</span></div>
    <div class="status-item"><span class="label">Memory:</span> <span class="value" id="memory-value">—</span></div>
    <div class="status-item"><span class="label">Shard Role:</span> <span class="value" id="shard-role">—</span></div>
    <div class="status-item"><span class="label">Peer ID:</span> <span class="value" id="peer-id-value">—</span></div>
  </div>
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">Initializing…</div>
    <div class="loading-progress"><div class="loading-progress-bar" id="loading-progress-bar" style="width: 0%"></div></div>
  </div>

  <script type="module">
    const CONFIG = {
      defaultModel: "Llama-3.2-1B-Instruct-q4f16_1-MLC",
      maxPeers: 6,
      maxRemoteWorkers: 2,
      maxAssistLatencyMs: 180,
      hysteresisMs: 3000,
      speculativeTokens: 4,
      mobileAssistOnly: false,
      GLOBAL_TAG: "p2p-llm-chat",
      tiers: [
        { name: "small", model: "Llama-3.2-1B-Instruct-q4f16_1-MLC", minScore: 0, mode: "local" },
        { name: "medium", model: "Llama-3.1-3B-Instruct-q4f16_1-MLC", minScore: 2, mode: "assist" },
        { name: "large", model: "Llama-3.1-8B-Instruct-q4f16_1-MLC", minScore: 4, mode: "assist+verify" }
      ],
      RELAY_URLS: ["wss://relay.damus.io", "wss://nos.lol", "wss://offchain.pub", "wss://relay.nostr.band/all", "wss://nostr.mom", "wss://relay.snort.social"],
      ICE_SERVERS: [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }]
    };

    const MSG_TYPE = { PEER_HELLO: 0x01, TOKEN_REQUEST: 0x02, TOKEN_RESPONSE: 0x03, LOGITS: 0x04, PING: 0x05, PONG: 0x06 };

    class P2PLLM {
      constructor() {
        this.peerId = this.generateId();
        this.pubKeyHex = "";
        this.nostrSockets = {};
        this.nostrSeen = new Set();
        this.relayReady = false;
        this.engine = null;
        this.currentTierIndex = 0;
        this.currentMode = "local";
        this.isGenerating = false;
        this.peers = new Map();
        this.peerConnections = new Map();
        this.pendingRequests = new Map();
        this.requestId = 0;
        this.lastTierChange = 0;
        this.score = 0;
        this.tokenTimes = [];
        this.modelLoading = null;
        this.deviceTier = this.classifyDevice();
        this.conversation = [];
        this.presenceInterval = null;
        this.helloInterval = null;
        this.debugLog = (msg) => {
          const d = document.getElementById('debug-log');
          if (d) { d.innerHTML += `<div>[${new Date().toISOString().slice(11,19)}] ${msg}</div>`; d.scrollTop = d.scrollHeight; }
          console.log('[DEBUG]', msg);
        };
        this.init();
      }

      generateId() {
        const arr = new Uint8Array(16);
        crypto.getRandomValues(arr);
        return Array.from(arr, b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
      }

      classifyDevice() {
        const ua = navigator.userAgent.toLowerCase();
        const isMobile = /android|webos|iphone|ipad|ipod|blackberry|windows phone/i.test(ua);
        const gpu = navigator.gpu;
        const memory = navigator.deviceMemory || 2;
        const cores = navigator.hardwareConcurrency || 2;
        if (isMobile || memory < 4 || cores < 4) return 'c';
        if (memory >= 8 && gpu && cores >= 8) return 'a';
        return 'b';
      }

      async init() {
        this.updateLoading('Generating identity...', 5);
        await this.initNostr();
        this.updateLoading('Connecting to Nostr relays...', 10);
        this.connectAllRelays();
        this.updateLoading('Initializing WebLLM...', 20);
        await this.initWebLLM();
        this.updateLoading('Ready', 100);
        setTimeout(() => this.hideLoading(), 500);

        document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') this.sendMessage(); });
        document.getElementById('send-btn').addEventListener('click', () => this.sendMessage());

        setInterval(() => this.computeScore(), 2000);
        setInterval(() => this.cleanupPeers(), 10000);
        setInterval(() => this.sendHello(), 25000);
        this.sendHello();
      }

      initNostr() {
        const saved = localStorage.getItem('p2p-llm-identity');
        if (saved) {
          const { pub } = JSON.parse(saved);
          this.pubKeyHex = pub;
        } else {
          this.pubKeyHex = this.generateId();
          localStorage.setItem('p2p-llm-identity', JSON.stringify({ pub: this.pubKeyHex }));
        }
        document.getElementById('peer-id-value').textContent = this.pubKeyHex.slice(0, 8) + '...';
        this.debugLog('Identity: ' + this.pubKeyHex.slice(0,8));
      }

      connectAllRelays() {
        this.debugLog('Connecting to Nostr relays...');
        const dotsContainer = document.getElementById('relay-dots');
        for (const url of CONFIG.RELAY_URLS) {
          const dot = document.createElement('div');
          dot.className = 'rdot';
          dot.title = url;
          dotsContainer.appendChild(dot);
          this.connectRelay(url, dot);
        }
      }

      connectRelay(url, dot) {
        if (this.nostrSockets[url] && this.nostrSockets[url].readyState <= 1) return;
        try {
          const ws = new WebSocket(url);
          this.nostrSockets[url] = ws;
          ws.onopen = () => {
            dot.className = 'rdot ok';
            this.debugLog('✓ ' + url.split('//')[1]);
            this.updateRelayStatus();
            const since = Math.floor(Date.now() / 1000) - 360;
            ws.send(JSON.stringify(["REQ", "p2p-sub", { kinds: [1], "#t": [CONFIG.GLOBAL_TAG], since }]));
          };
          ws.onmessage = (e) => {
            try {
              const msg = JSON.parse(e.data);
              if (msg[0] === "EVENT") this.handleNostrEvent(msg[2]);
              else if (msg[0] === "EOSE") { this.relayReady = true; this.updateRelayStatus(); }
            } catch {}
          };
          ws.onerror = (e) => { dot.className = 'rdot fail'; };
          ws.onclose = (e) => { dot.className = 'rdot fail'; this.nostrSockets[url] = null; setTimeout(() => this.connectRelay(url, dot), 5000); };
        } catch (e) {
          dot.className = 'rdot fail';
        }
      }

      updateRelayStatus() {
        const connected = Object.values(this.nostrSockets).filter(s => s && s.readyState === 1).length;
        document.getElementById('relays-status').textContent = `${connected}/${CONFIG.RELAY_URLS.length}`;
        const st = document.getElementById('relays-status');
        if (connected > 0) { st.className = 'connected'; } else { st.className = 'searching'; }
      }

      signAndPublish(content) {
        if (!this.pubKeyHex) return;
        const event = {
          kind: 1,
          created_at: Math.floor(Date.now() / 1000),
          tags: [["t", CONFIG.GLOBAL_TAG]],
          pubkey: this.pubKeyHex,
          content: JSON.stringify(content),
          id: this.generateId(),
          sig: ""
        };
        this.nostrSeen.add(event.id);
        const raw = JSON.stringify(["EVENT", event]);
        let sent = 0;
        for (const ws of Object.values(this.nostrSockets)) {
          if ((ws && ws.readyState) === 1) { ws.send(raw); sent++; }
        }
        return sent > 0;
      }

      sendHello() {
        this.signAndPublish({ type: 'hello', from: this.pubKeyHex, deviceTier: this.deviceTier, webgpu: !!navigator.gpu, memory: navigator.deviceMemory || 2, hasEngine: !!this.engine, ts: Date.now() });
      }

      handleNostrEvent(ev) {
        if (!ev || !ev.id || this.nostrSeen.has(ev.id)) return;
        this.nostrSeen.add(ev.id);
        if (this.nostrSeen.size > 3000) {
          const arr = [...this.nostrSeen];
          this.nostrSeen = new Set(arr.slice(arr.length - 1500));
        }
        const age = Math.floor(Date.now() / 1000) - (ev.created_at || 0);
        if (age > 360 || age < -30) return;
        let data;
        try { data = JSON.parse(ev.content); } catch (e) { return; }
        if (ev.pubkey === this.pubKeyHex) return;
        
        if (data.type === 'hello') {
          this.addOrUpdatePeer(ev.pubkey, data);
        } else if (data.type === 'chat') {
          this.receiveChatMessage(ev.pubkey, data);
        } else if (data.type === 'offer' || data.type === 'answer' || data.type === 'ice') {
          this.handleSignaling(ev.pubkey, data);
        }
      }

      addOrUpdatePeer(pubKey, data) {
        const isNew = !this.peers.has(pubKey);
        this.peers.set(pubKey, { ...data, lastSeen: Date.now(), rtt: 0 });
        
        this.updatePeersUI();
        
        if (isNew) {
          this.debugLog('Peer: ' + pubKey.slice(0,8) + ' tier=' + (data.deviceTier||'?'));
          if (data.hasEngine) {
            this.connectToPeer(pubKey);
          }
        }
      }

      async connectToPeer(pubKey) {
        if (this.peerConnections.has(pubKey)) return;
        if (pubKey === this.pubKeyHex) return;
        
        this.debugLog('Connecting to ' + pubKey.slice(0,8));
        
        try {
          const pc = new RTCPeerConnection({ iceServers: CONFIG.ICE_SERVERS });
          this.peerConnections.set(pubKey, pc);
          
          pc.onicecandidate = (e) => {
            if (e.candidate) {
              this.signAndPublish({ type: 'ice', to: pubKey, candidate: e.candidate });
            }
          };
          
          pc.onconnectionstatechange = () => {
            const state = pc.connectionState;
            this.debugLog('WebRTC ' + pubKey.slice(0,8) + ': ' + state);
            if (state === 'failed' || state === 'disconnected') {
              this.peerConnections.delete(pubKey);
            }
          };
          
          const dc = pc.createDataChannel('chat', { ordered: true });
          dc.onopen = () => this.debugLog('DataChannel open with ' + pubKey.slice(0,8));
          dc.onmessage = (e) => this.handlePeerMessage(pubKey, JSON.parse(e.data));
          
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          
          this.signAndPublish({ type: 'offer', to: pubKey, sdp: offer.sdp });
          
        } catch(e) {
          this.debugLog('WebRTC error: ' + e.message);
        }
      }

      handleSignaling(from, data) {
        const pubKey = data.to;
        if (pubKey !== this.pubKeyHex) return;
        
        this.debugLog('Signal from ' + from.slice(0,8) + ': ' + data.type);
        
        let pc = this.peerConnections.get(from);
        
        if (!pc && data.type === 'offer') {
          pc = new RTCPeerConnection({ iceServers: CONFIG.ICE_SERVERS });
          this.peerConnections.set(from, pc);
          
          pc.ondatachannel = (e) => {
            const dc = e.channel;
            dc.onopen = () => this.debugLog('DataChannel from ' + from.slice(0,8));
            dc.onmessage = (e) => this.handlePeerMessage(from, JSON.parse(e.data));
          };
          
          pc.onicecandidate = (e) => {
            if (e.candidate) {
              this.signAndPublish({ type: 'ice', to: from, candidate: e.candidate });
            }
          };
        }
        
        if (pc) {
          try {
            if (data.type === 'offer') {
              pc.setRemoteDescription({ type: 'offer', sdp: data.sdp });
              pc.createAnswer().then(a => pc.setLocalDescription(a)).then(() => {
                this.signAndPublish({ type: 'answer', to: from, sdp: pc.localDescription.sdp });
              });
            } else if (data.type === 'answer') {
              pc.setRemoteDescription({ type: 'answer', sdp: data.sdp });
            } else if (data.type === 'ice' && data.candidate) {
              pc.addIceCandidate(data.candidate);
            }
          } catch(e) {
            this.debugLog('Signal error: ' + e.message);
          }
        }
      }

      handlePeerMessage(pubKey, data) {
        if (data.type === 'chat') {
          this.addMessage('user', data.text, data.from);
        }
      }

      receiveChatMessage(from, data) {
        this.addMessage('user', data.text, from);
        
        for (const [pubKey, pc] of this.peerConnections) {
          if (pc.connectionState === 'connected') {
            const dc = pc.datachannels?.[0] || Array.from(pc.datachannels || [])[0];
            if (dc && dc.readyState === 'open') {
              dc.send(JSON.stringify({ type: 'chat', text: data.text, from }));
            }
          }
        }
      }

      cleanupPeers() {
        const now = Date.now();
        for (const [pub, peer] of this.peers) {
          if (now - peer.lastSeen > 60000) {
            this.peers.delete(pub);
            const pc = this.peerConnections.get(pub);
            if (pc) { pc.close(); this.peerConnections.delete(pub); }
          }
        }
        this.updatePeersUI();
      }

      updatePeersUI() {
        const container = document.getElementById('peers-container');
        const peers = [...this.peers.values()];
        document.getElementById('peers-value').textContent = peers.length;
        if (peers.length === 0) {
          container.innerHTML = 'No peers connected';
        } else {
          container.innerHTML = peers.map(p => `
            <div class="peer-item">
              <span>${(p.from || 'unknown').slice(0, 8)}...</span>
              <span class="tier ${p.deviceTier || 'c'}">${(p.deviceTier || 'c').toUpperCase()}</span>
              <span class="status">${p.hasEngine ? '✓' : '-'}</span>
            </div>
          `).join('');
        }
      }

      async initWebLLM() {
        document.getElementById('device-tier').textContent = this.deviceTier.toUpperCase();
        document.getElementById('webgpu-value').textContent = !!navigator.gpu;
        document.getElementById('memory-value').textContent = (navigator.deviceMemory || 2) + 'GB';
        document.getElementById('shard-role').textContent = 'primary';
        this.debugLog('Device: ' + this.deviceTier + ' WebGPU: ' + !!navigator.gpu);

        const initProgress = (report) => {
          if (report.progress) {
            const pct = Math.round(report.progress * 70 + 20);
            this.updateLoading('Loading model: ' + report.text, pct);
          }
        };

        if (!navigator.gpu) {
          this.updateLoading('No WebGPU - using demo mode', 50);
          this.engine = this.createDemoEngine();
          this.debugLog('Using demo mode');
        } else {
          try {
            const { CreateMLCEngine } = await import('https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.82/+esm');
            this.engine = await CreateMLCEngine(CONFIG.defaultModel, { initProgressCallback: initProgress, device: 'webgpu' });
            this.debugLog('WebLLM loaded');
          } catch (e) {
            this.debugLog('WebLLM failed: ' + e.message);
            this.engine = this.createDemoEngine();
          }
        }

        this.updateStatus();
      }

      createDemoEngine() {
        const responses = [
          "That's interesting! Tell me more about what you're thinking.",
          "I understand. Let me share my perspective on this.",
          "Great question. Here's what I believe:",
          "Thanks for sharing. I'd be happy to discuss further.",
          "That's a fascinating point. Consider it from this angle:",
          "As an AI, I think about this from multiple perspectives..."
        ];
        return {
          model: "Demo-Mode",
          chat: {
            completions: {
              create: async (opts) => {
                const text = responses[Math.floor(Math.random() * responses.length)];
                return (async function*() {
                  for (let i = 0; i < text.length; i++) {
                    await new Promise(r => setTimeout(r, 30));
                    yield { choices: [{ delta: { content: text[i] } }] };
                  }
                })();
              }
            }
          }
        };
      }

      updateLoading(text, pct) {
        document.getElementById('loading-text').textContent = text;
        document.getElementById('loading-progress-bar').style.width = pct + '%';
      }

      hideLoading() {
        document.getElementById('loading').classList.add('hidden');
      }

      computeScore() {
        const now = Date.now();
        let newScore = 0;
        const activePeers = [...this.peers.values()].filter(p => now - p.lastSeen < 60000);
        newScore += Math.min(activePeers.length, CONFIG.maxPeers);
        const activeWithEngine = activePeers.filter(p => p.hasEngine).length;
        if (activeWithEngine > 0) newScore += activeWithEngine;
        const avgRtt = activePeers.length > 0 ? activePeers.reduce((s, p) => s + (p.rtt || 0), 0) / activePeers.length : 0;
        if (avgRtt > CONFIG.maxAssistLatencyMs) newScore -= 1;
        const hasTierA = activePeers.some(p => p.deviceTier === 'a');
        if (hasTierA) newScore += 1;
        this.score = Math.max(0, Math.min(6, newScore));
        this.selectTier();
        this.updateStatus();
      }

      selectTier() {
        const now = Date.now();
        if (now - this.lastTierChange < CONFIG.hysteresisMs) return;
        let newTierIndex = 0;
        for (let i = CONFIG.tiers.length - 1; i >= 0; i--) {
          if (this.score >= CONFIG.tiers[i].minScore) { newTierIndex = i; break; }
        }
        if (newTierIndex !== this.currentTierIndex) {
          this.lastTierChange = now;
          this.currentTierIndex = newTierIndex;
          this.currentMode = CONFIG.tiers[newTierIndex].mode;
        }
      }

      updateStatus() {
        const tier = CONFIG.tiers[this.currentTierIndex];
        document.getElementById('tier-value').textContent = tier.name;
        document.getElementById('mode-value').textContent = this.currentMode;
        document.getElementById('score-value').textContent = this.score;
        document.getElementById('net-mode').textContent = this.currentMode;
        document.getElementById('shard-value').textContent = this.peers.size + ' peers';
      }

      async sendMessage() {
        if (this.isGenerating) return;
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        this.addMessage('user', text, this.pubKeyHex);
        this.isGenerating = true;
        this.updateSendButton(true);
        
        const btn = document.getElementById('send-btn');
        btn.classList.add('loading');
        btn.textContent = 'Generating...';
        
        this.signAndPublish({ type: 'chat', text, from: this.pubKeyHex });
        
        const startTime = performance.now();
        let fullResponse = '';
        try {
          const messages = this.conversation.concat({ role: 'user', content: text });
          const generator = await this.engine.chat.completions.create({ messages, temperature: 0.7, max_tokens: 256, stream: true });
          let assistantMessage = this.addMessage('assistant', '', 'AI');
          for await (const chunk of generator) {
            const content = chunk.choices?.[0]?.delta?.content || '';
            if (content) {
              fullResponse += content;
              assistantMessage.querySelector('.content').textContent = fullResponse;
              const msgs = document.getElementById('messages');
              msgs.scrollTop = msgs.scrollHeight;
            }
          }
          this.conversation.push({ role: 'user', content: text }, { role: 'assistant', content: fullResponse });
          if (this.conversation.length > 20) this.conversation = this.conversation.slice(-20);
          const elapsed = (performance.now() - startTime) / 1000;
          const tps = fullResponse.length / 4 / elapsed;
          this.tokenTimes.push(tps);
          if (this.tokenTimes.length > 10) this.tokenTimes.shift();
          const avgTps = this.tokenTimes.reduce((a, b) => a + b, 0) / this.tokenTimes.length;
          document.getElementById('tps-value').textContent = avgTps.toFixed(1);
        } catch (e) {
          this.addMessage('assistant', 'Error: ' + e.message, 'AI');
        }
        this.isGenerating = false;
        this.updateSendButton(false);
        btn.classList.remove('loading');
        btn.textContent = 'Send';
      }

      addMessage(role, content, from) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        const label = role === 'user' ? (from === this.pubKeyHex ? 'You' : from?.slice(0,8)+'...') : 'AI';
        div.innerHTML = `<div class="role">${label}</div><div class="content">${content}</div>`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return div;
      }

      updateSendButton(loading) {
        const btn = document.getElementById('send-btn');
        btn.disabled = loading;
        document.getElementById('chat-input').disabled = loading;
      }
    }

    const app = new P2PLLM();
  </script>
</body>
